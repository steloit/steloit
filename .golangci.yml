# golangci-lint v2 configuration for Brokle.
#
# Policy notes:
# - fieldalignment disabled: reordering for a few bytes of struct padding
#   ruins logical grouping in domain types. Enable per-file with
#   //lint:file-ignore on measured hot paths if ever needed.
# - shadow disabled: false positives on idiomatic `err := ...; err := ...`.
# - perfsprint disabled: the `fmt.Sprintf` → `strconv` suggestions are
#   noise in services where the bottleneck is I/O.
# - forbidigo enabled: encodes house rules that golangci-lint doesn't
#   express natively (see linters.settings.forbidigo below).

version: "2"

run:
  timeout: 5m
  tests: true
  build-tags:
    - integration
    - enterprise
  modules-download-mode: readonly

linters:
  enable:
    # Error handling
    - errcheck
    - errorlint
    - nilerr

    # Nil pointer detection
    - nilnil
    - staticcheck

    # Code quality
    - revive
    - govet
    - ineffassign
    - unconvert
    - unparam
    - unused

    # Convention enforcement (our house rules; see settings.forbidigo)
    - forbidigo

    # Performance
    - prealloc

    # Modern Go (1.22+)
    - copyloopvar
    - intrange

    # Style
    - misspell

    # Security
    - gosec

    # Bugs
    - bodyclose
    - contextcheck
    - noctx
    - rowserrcheck
    - sqlclosecheck

    # Complexity
    - gocyclo
    - nestif

    # Testing
    - testifylint

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true
      exclude-functions:
        - (*database/sql.Rows).Close
        - (io.Closer).Close
        - (*os.File).Close

    revive:
      rules:
        - name: error-return
          severity: error
        - name: error-naming
          severity: warning
        - name: error-strings
          severity: warning
        - name: errorf
          severity: warning
        - name: if-return
          severity: warning
        - name: increment-decrement
          severity: warning
        - name: var-naming
          severity: warning
        - name: var-declaration
          severity: warning
        - name: package-comments
          severity: warning
        - name: dot-imports
          severity: error
        - name: blank-imports
          severity: warning
        - name: exported
          severity: warning
          arguments:
            - "checkPrivateReceivers"
            - "disableStutteringCheck"
        - name: indent-error-flow
          severity: error
        - name: unexported-return
          severity: warning
        - name: time-naming
          severity: warning
        - name: context-as-argument
          severity: warning
        - name: context-keys-type
          severity: warning

    staticcheck:
      checks:
        - all
        - "-SA1019"

    gosec:
      severity: medium
      confidence: medium
      excludes:
        - G104
        - G401

    # Bumped from 15 → 20: switch-heavy dispatchers and HTTP routers
    # trivially exceed 15 without being genuinely complex.
    gocyclo:
      min-complexity: 20

    govet:
      enable:
        - nilness
        - unusedwrite
      disable:
        - printf
        # fieldalignment: disabled globally — see header comment.
        # shadow: disabled globally — false positives on err patterns.

    nestif:
      min-complexity: 4

    prealloc:
      simple: true
      range-loops: true
      for-loops: true

    copyloopvar:
      check-alias: true

    # House rules that only golangci-lint can reject at author time.
    # When a new convention earns enforcement, add it here — not to a
    # tribal-knowledge doc.
    forbidigo:
      analyze-types: true
      forbid:
        # Prefer Go 1.18+ `any` alias.
        - pattern: '^interface\{\}$'
          msg: "use 'any' instead of 'interface{}' (Go 1.18+)"

        # `deref*` helpers signal a domain↔schema type mismatch. Align
        # the domain type with the schema instead (pointer for nullable,
        # value for NOT NULL) so pgx/sqlc can scan directly.
        - pattern: '^deref[A-Z]\w*$'
          msg: "deref* helpers indicate a domain↔schema type mismatch — align the domain type"

        # context.TODO is a placeholder — surface it instead of shipping
        # it. Anchored form + analyze-types matches the qualified
        # identifier regardless of import alias.
        - pattern: '^context\.TODO$'
          msg: "context.TODO() is not allowed — pass the request context or context.Background() with a deadline"

        # pgtype.Numeric leaking into domain code means the sqlc override
        # missed a NUMERIC column (canonical override key is
        # pg_catalog.numeric — see CLAUDE.md Mandatory Rules).
        - pattern: '^pgtype\.Numeric$'
          msg: "pgtype.Numeric in domain code → sqlc override missed a column; use shopspring.Decimal and add pg_catalog.numeric mapping in sqlc.yaml"

        # pgtype.Timestamptz leaking in means DDL used TIMESTAMPTZ
        # shorthand; sqlc canonicalises before matching overrides.
        - pattern: '^pgtype\.Timestamptz$'
          msg: "pgtype.Timestamptz in domain code → DDL used TIMESTAMPTZ shorthand; canonicalise to TIMESTAMP WITH TIME ZONE"

        # emptyToNil* is the write-path sibling of deref* — same
        # schema-lie signal. Prefer aligning the domain field with the
        # schema (pointer for nullable, value + NOT NULL DEFAULT for
        # non-null) so no helper is needed.
        - pattern: '^emptyToNil[A-Z]\w*$'
          msg: "emptyToNil* helpers indicate domain↔schema mismatch — align field (pointer for nullable, value + NOT NULL DEFAULT for non-null)"

        # ulid package was removed in the UUIDv7 migration.
        - pkg: '^github\.com/oklog/ulid'
          msg: "ulid is banned — use pkg/uid (UUIDv7) for new IDs"

        # lib/pq is banned; pgx v5 is the sole Postgres driver.
        - pkg: '^github\.com/lib/pq'
          msg: "lib/pq is banned — use pgx v5 (internal/infrastructure/db)"

  exclusions:

    # Paths excluded from all linting. Anchored to prevent substring
    # matches (e.g., `web` was silently excluding `repository/website/`).
    paths:
      - ^vendor/
      - ^web/
      - ^sdk/
      - ^docs/
      - ^scripts/
      - ^deployments/
      - ^tests/load/
      - ^bin/
      - ^migrations/
      - ^seeds/
      - ".*\\.pb\\.go$"
      - ".*\\.gen\\.go$"
    rules:
      # Tests get most linters; gocyclo/gosec/funlen/dupl relaxed because
      # table-driven tests and fixtures balloon those naturally. errcheck
      # stays on — tests that silently drop errors silently pass.
      - path: _test\.go
        linters:
          - gocyclo
          - dupl
          - gosec
          - funlen
      - path: _test\.go
        text: "dot imports"

      # codecs.go IS the legitimate pgtype ↔ domain bridge — it exists to
      # convert pgtype.Numeric/Timestamptz into shopspring.Decimal and
      # time.Time. The forbidigo rules ban those pgtype symbols in
      # "domain code"; this file is infrastructure, not domain.
      - path: ^internal/infrastructure/db/codecs\.go$
        linters:
          - forbidigo

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  uniq-by-line: true
